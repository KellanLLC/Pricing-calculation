<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kellan Pricing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .calculate-btn:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .price-row:last-child {
            border-bottom: none;
            margin-top: 10px;
            padding-top: 15px;
            font-weight: 700;
            font-size: 18px;
            color: #667eea;
        }
        
        .price-label {
            color: #666;
        }
        
        .price-value {
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .tier-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .note {
            margin-top: 15px;
            padding: 12px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Kellan Pricing Calculator</h1>
        <p class="subtitle">Calculate monthly pricing based on call volume</p>
        
        <div class="input-group">
            <label for="calls">Monthly Call Volume</label>
            <input type="number" id="calls" placeholder="e.g., 150" min="0">
        </div>
        
        <button class="calculate-btn" onclick="calculatePrice()">Calculate Price</button>
        
        <div class="result" id="result">
            <div id="tier-badge"></div>
            <h2>Monthly Pricing</h2>
            <div class="price-row">
                <span class="price-label">Base Fee</span>
                <span class="price-value" id="base-fee">$0</span>
            </div>
            <div class="price-row">
                <span class="price-label">Overage Charges</span>
                <span class="price-value" id="overage">$0</span>
            </div>
            <div class="price-row">
                <span class="price-label">Total Monthly Price</span>
                <span class="price-value" id="total">$0</span>
            </div>
            <div class="note" id="note"></div>
        </div>
    </div>

    <script>
        function calculatePrice() {
            const calls = parseInt(document.getElementById('calls').value);
            
            if (isNaN(calls) || calls < 0) {
                alert('Please enter a valid number of calls');
                return;
            }
            
            let tier, base, included, overageRate, cap;
            
            // Determine tier
            if (calls <= 25) {
                tier = 'STARTER';
                base = 297;
                included = 25;
                overageRate = 12;
                cap = 600;
            } else if (calls <= 60) {
                tier = 'GROWTH';
                base = 497;
                included = 60;
                overageRate = 10;
                cap = 900;
            } else if (calls <= 120) {
                tier = 'PRO';
                base = 697;
                included = 120;
                overageRate = 8;
                cap = 1200;
            } else {
                tier = 'SCALE';
                base = 997;
                included = 180;
                overageRate = 6;
                cap = 1500;
            }
            
            // Calculate overage
            const extraCalls = Math.max(0, calls - included);
            const rawOverage = extraCalls * overageRate;
            const finalOverage = Math.min(rawOverage, cap - base);
            const total = base + finalOverage;
            
            // Display results
            document.getElementById('tier-badge').innerHTML = `<span class="tier-badge">${tier} TIER</span>`;
            document.getElementById('base-fee').textContent = `$${base}`;
            document.getElementById('overage').textContent = `$${finalOverage}`;
            document.getElementById('total').textContent = `$${total}`;
            
            // Add note
            let noteText = `Price is locked for 12 months. Based on ${calls} calls/month (${included} included, ${extraCalls} overage).`;
            document.getElementById('note').textContent = noteText;
            
            // Show result
            document.getElementById('result').classList.add('show');
        }
        
        // Allow Enter key to calculate
        document.getElementById('calls').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculatePrice();
            }
        });
    </script>
</body>
</html>
